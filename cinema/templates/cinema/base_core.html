{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CineVerse – Premium cinema ticket booking experience. Book VIP, IMAX, and Couple seats online.">
    <title>{% block title %}CineVerse | Premium Cinema Experience{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="{% static 'cinema/css/style.css' %}?v=1.3">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body_content %}
    {% endblock %}
    
    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- JavaScript -->
    <script src="{% static 'cinema/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
